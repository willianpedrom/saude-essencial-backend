<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gota App – Gestão de Relacionamento</title>
    <link rel="icon" type="image/png" href="/icon-512.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#166534" />
    <meta name="color-scheme" content="light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <meta name="description"
        content="Plataforma exclusiva para consultoras de bem-estar gerenciarem clientes, anamneses e protocolos personalizados." />
    <!-- Open Graph for Social Share -->
    <meta property="og:title" content="Gota App – Gestão de Relacionamento" />
    <meta property="og:description"
        content="Plataforma exclusiva para consultoras de bem-estar gerenciarem clientes, anamneses e protocolos personalizados." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/index.css" />
</head>

<body>
    <div id="app"></div>
    <!-- API URL config (external to comply with Content Security Policy) -->

    <script src="/js/config.js?v=33"></script>
    <script type="module" src="js/app.js?v=33"></script>

    <!-- PWA: Service Worker + Install Prompt -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => { });
        }

        let _deferredInstall = null;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            _deferredInstall = e;
            // Show install banner after 10s if user is logged in
            setTimeout(() => {
                if (!_deferredInstall || sessionStorage.getItem('pwa_dismissed')) return;
                const banner = document.createElement('div');
                banner.id = 'pwa-banner';
                banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;' +
                    'background:linear-gradient(135deg,#166534,#2d4a28);color:white;padding:16px 20px;' +
                    'display:flex;align-items:center;justify-content:space-between;gap:12px;' +
                    'box-shadow:0 -4px 20px rgba(0,0,0,0.2);animation:slideUp .4s ease';
                banner.innerHTML = `
            <div style="display:flex;align-items:center;gap:12px;flex:1">
              <span style="font-size:1.6rem">💧</span>
              <div>
                <div style="font-weight:700;font-size:0.95rem">Instalar o Gota App</div>
                <div style="font-size:0.78rem;opacity:0.85">Acesse mais rápido direto da tela inicial</div>
              </div>
            </div>
            <div style="display:flex;gap:8px;flex-shrink:0">
              <button id="pwa-dismiss" style="background:transparent;border:1px solid rgba(255,255,255,0.3);color:white;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:0.82rem">Agora não</button>
              <button id="pwa-install" style="background:white;color:#166534;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-weight:700;font-size:0.85rem">Instalar</button>
            </div>`;
                if (!document.getElementById('pwa-anim-style')) {
                    const s = document.createElement('style');
                    s.id = 'pwa-anim-style';
                    s.textContent = '@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}';
                    document.head.appendChild(s);
                }
                document.body.appendChild(banner);
                document.getElementById('pwa-install').addEventListener('click', () => {
                    _deferredInstall.prompt();
                    _deferredInstall.userChoice.then(() => { _deferredInstall = null; banner.remove(); });
                });
                document.getElementById('pwa-dismiss').addEventListener('click', () => {
                    sessionStorage.setItem('pwa_dismissed', '1');
                    banner.remove();
                });
            }, 10000);
        });
    </script>
</body>

</html>
